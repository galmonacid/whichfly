name: iOS TestFlight

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Release API base URL (https://...)"
        required: true
        type: string
      build_name:
        description: "iOS marketing version (CFBundleShortVersionString)"
        required: false
        default: "1.0.0"
        type: string
      build_number:
        description: "iOS build number (CFBundleVersion)"
        required: false
        default: "2"
        type: string
      upload_to_testflight:
        description: "Upload built IPA to TestFlight"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-upload:
    runs-on: macos-14
    defaults:
      run:
        working-directory: app
    env:
      IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
      IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
      APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
      APPSTORE_CONNECT_PRIVATE_KEY: ${{ secrets.APPSTORE_CONNECT_PRIVATE_KEY }}
      API_BASE_URL: ${{ inputs.api_base_url }}
      BUILD_NAME: ${{ inputs.build_name }}
      BUILD_NUMBER: ${{ inputs.build_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Validate required secrets
        run: |
          missing=0
          for key in \
            IOS_CERTIFICATE_P12_BASE64 \
            IOS_CERTIFICATE_PASSWORD \
            IOS_PROVISIONING_PROFILE_BASE64 \
            APPSTORE_CONNECT_ISSUER_ID \
            APPSTORE_CONNECT_KEY_ID \
            APPSTORE_CONNECT_PRIVATE_KEY; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required GitHub secret: ${key}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Ensure iOS Podfile exists
        run: |
          if [ -f ios/Podfile ]; then
            echo "ios/Podfile already present."
            exit 0
          fi

          cat > ios/Podfile <<'PODFILE'
          platform :ios, '13.0'

          ENV['COCOAPODS_DISABLE_STATS'] = 'true'

          project 'Runner', {
            'Debug' => :debug,
            'Profile' => :release,
            'Release' => :release,
          }

          def flutter_root
            generated_xcode_build_settings_path = File.expand_path(File.join('..', 'Flutter', 'Generated.xcconfig'), __FILE__)
            unless File.exist?(generated_xcode_build_settings_path)
              raise "#{generated_xcode_build_settings_path} must exist. If you're running pod install manually, make sure flutter pub get is executed first"
            end

            File.foreach(generated_xcode_build_settings_path) do |line|
              matches = line.match(/FLUTTER_ROOT\=(.*)/)
              return matches[1].strip if matches
            end
            raise "FLUTTER_ROOT not found in #{generated_xcode_build_settings_path}. Try deleting Generated.xcconfig, then run flutter pub get"
          end

          require File.expand_path(File.join('packages', 'flutter_tools', 'bin', 'podhelper'), flutter_root)

          flutter_ios_podfile_setup

          target 'Runner' do
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
            target 'RunnerTests' do
              inherit! :search_paths
            end
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
            end
          end
          PODFILE

      - name: Ensure CocoaPods available
        run: |
          if command -v pod >/dev/null 2>&1; then
            pod --version
            exit 0
          fi
          sudo gem install cocoapods --no-document
          pod --version

      - name: Install iOS pods
        run: |
          cd ios
          pod install --repo-update

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          if echo -n "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/whichfly.mobileprovision 2>/dev/null; then
            echo "Provisioning profile decoded with GNU base64."
          else
            echo -n "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -D > ~/Library/MobileDevice/Provisioning\ Profiles/whichfly.mobileprovision
            echo "Provisioning profile decoded with BSD base64."
          fi

      - name: Build signed IPA
        run: |
          flutter build ipa \
            --release \
            --build-name "$BUILD_NAME" \
            --build-number "$BUILD_NUMBER" \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --export-method app-store

      - name: Locate IPA
        id: ipa
        run: |
          IPA_PATH="$(find build/ios/ipa -maxdepth 1 -name '*.ipa' | head -n 1)"
          if [ -z "$IPA_PATH" ]; then
            echo "::error::No IPA found under app/build/ios/ipa"
            exit 1
          fi
          echo "path=$IPA_PATH" >> "$GITHUB_OUTPUT"
          echo "IPA path: $IPA_PATH"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: whichfly-ios-ipa
          path: app/${{ steps.ipa.outputs.path }}
          if-no-files-found: error

      - name: Upload to TestFlight
        if: ${{ inputs.upload_to_testflight }}
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: app/${{ steps.ipa.outputs.path }}
          issuer-id: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_CONNECT_PRIVATE_KEY }}
